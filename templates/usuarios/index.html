{% extends 'base.html' %}
{% block title %}Usuarios{% endblock %}
{% block content %}

<h2 class="mb-3"><i class="bi bi-shield-lock"></i> Lista de Usuarios</h2>
<a href="{{ url_for('usuario.create') }}" class="btn btn-success mb-3">
  <i class="bi bi-plus-circle"></i> Nuevo Usuario
</a>
<table class="table table-striped table-bordered">
  <thead class="table-dark">
    <tr>
      <th>ID</th><th>Nombre</th><th>Username</th><th>Rol</th><th></th><th></th>
    </tr>
  </thead>
  <tbody>
    {% for item in usuarios %}
    <tr>
      <td>{{ item.id }}</td>
      <td>{{ item.nombre }}</td>
      <td>{{ item.username }}</td>
      <td><span class="badge bg-primary">{{ item.rol }}</span></td>
      <td><a href="{{ url_for('usuario.edit', id=item.id) }}" class="btn btn-warning btn-sm"><i class="bi bi-pencil"></i> Editar</a></td>
      <td><a href="{{ url_for('usuario.delete', id=item.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar?')"><i class="bi bi-trash"></i> Eliminar</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
