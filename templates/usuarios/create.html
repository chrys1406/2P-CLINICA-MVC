{% extends 'base.html' %}
{% block title %}Nuevo Usuario{% endblock %}
{% block content %}

<h2 class="mb-3"><i class="bi bi-person-plus"></i> Nuevo Usuario</h2>
<div class="card shadow-sm" style="max-width:500px;">
  <div class="card-body">
    <form action="{{ url_for('usuario.create') }}" method="post">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Rol</label>
        <select name="rol" class="form-control" required>
          <option value="admin">Admin</option>
          <option value="usuario">Usuario</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('usuario.index') }}" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
  </div>
</div>

{% endblock %}
