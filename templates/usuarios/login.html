<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login | Clínica Médica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
      body { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); min-height: 100vh; display:flex; align-items:center; justify-content:center; }
      .card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
      .card-header { background: #0d6efd; color: #fff; border-radius: 16px 16px 0 0 !important; text-align:center; padding: 2rem; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card">
            <div class="card-header">
              <i class="bi bi-hospital fs-1"></i>
              <h4 class="mt-2 mb-0">Clínica Médica</h4>
              <small>Sistema de Gestión</small>
            </div>
            <div class="card-body p-4">
              <h5 class="mb-3 text-center text-muted">Iniciar Sesión</h5>
              {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
              {% endif %}
              <form action="{{ url_for('usuario.login') }}" method="post">
                <div class="mb-3">
                  <label class="form-label">Usuario</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label">Contraseña</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  <i class="bi bi-box-arrow-in-right"></i> Ingresar
                </button>
              </form>
              <hr>
              <p class="text-center text-muted mb-0">¿No tienes cuenta? 
                <a href="{{ url_for('usuario.register') }}">Regístrate</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
