<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{% endblock %} | Clínica Médica</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
      body { background-color: #f8f9fa; }
      .navbar-brand { font-weight: 700; letter-spacing: 1px; }
      .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; padding-top: 1.5rem; }
      .sidebar .nav-link { color: #495057; border-radius: 8px; margin-bottom: 4px; }
      .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9f5ff; color: #0d6efd; }
      .sidebar .nav-link i { margin-right: 8px; }
      .main-content { padding: 2rem; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#0d6efd;">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('home') }}">
          <i class="bi bi-hospital"></i> Clínica Médica
        </a>
        <div class="ms-auto d-flex align-items-center">
          {% if session.get('usuario_nombre') %}
            <span class="text-white me-3"><i class="bi bi-person-circle"></i> {{ session['usuario_nombre'] }}</span>
            <a href="{{ url_for('usuario.logout') }}" class="btn btn-outline-light btn-sm">
              <i class="bi bi-box-arrow-right"></i> Salir
            </a>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        {% if session.get('usuario_id') %}
        <nav class="col-md-2 sidebar d-none d-md-block">
          <ul class="nav flex-column px-2">
            <li class="nav-item">
              <a class="nav-link {{ is_active('/consultas/') }}" href="{{ url_for('consulta.index') }}">
                <i class="bi bi-clipboard2-pulse"></i> Consultas
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {{ is_active('/medicos/') }}" href="{{ url_for('medico.index') }}">
                <i class="bi bi-person-badge"></i> Médicos
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {{ is_active('/pacientes/') }}" href="{{ url_for('paciente.index') }}">
                <i class="bi bi-people"></i> Pacientes
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {{ is_active('/usuarios/') }}" href="{{ url_for('usuario.index') }}">
                <i class="bi bi-shield-lock"></i> Usuarios
              </a>
            </li>
          </ul>
        </nav>
        <main class="col-md-10 main-content">
        {% else %}
        <main class="col-12 main-content">
        {% endif %}
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
