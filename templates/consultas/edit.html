{% extends 'base.html' %}
{% block title %}Editar Consulta{% endblock %}
{% block content %}

<h2 class="mb-3"><i class="bi bi-pencil-square"></i> Editar Consulta</h2>
<div class="card shadow-sm" style="max-width:550px;">
  <div class="card-body">
    <form action="{{ url_for('consulta.edit', id=consulta.id) }}" method="post">
      <div class="mb-3">
        <label class="form-label">Médico</label>
        <select name="medico_id" class="form-control" required>
          <option value="">Seleccione un Médico</option>
          {% for medico in medicos %}
            <option value="{{ medico.id }}" {% if medico.id == consulta.medico_id %}selected{% endif %}>
              {{ medico.nombre }} - {{ medico.especialidad }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Paciente</label>
        <select name="paciente_id" class="form-control" required>
          <option value="">Seleccione un Paciente</option>
          {% for paciente in pacientes %}
            <option value="{{ paciente.id }}" {% if paciente.id == consulta.paciente_id %}selected{% endif %}>
              {{ paciente.nombre }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Fecha</label>
        <input type="date" name="fecha" class="form-control" value="{{ consulta.fecha.strftime('%Y-%m-%d') }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Diagnóstico</label>
        <textarea name="diagnostico" class="form-control" rows="2" required>{{ consulta.diagnostico }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Tratamiento</label>
        <textarea name="tratamiento" class="form-control" rows="2" required>{{ consulta.tratamiento }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">Actualizar</button>
      <a href="{{ url_for('consulta.index') }}" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
  </div>
</div>

{% endblock %}
