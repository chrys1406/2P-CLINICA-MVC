{% extends 'base.html' %}
{% block title %}Nueva Consulta{% endblock %}
{% block content %}

<h2 class="mb-3"><i class="bi bi-clipboard2-plus"></i> Registrar Consulta</h2>
<div class="card shadow-sm" style="max-width:550px;">
  <div class="card-body">
    <form action="{{ url_for('consulta.create') }}" method="post">
      <div class="mb-3">
        <label class="form-label">Médico</label>
        <select name="medico_id" class="form-control" required>
          <option value="">Seleccione un Médico</option>
          {% for medico in medicos %}
            <option value="{{ medico.id }}">{{ medico.nombre }} - {{ medico.especialidad }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Paciente</label>
        <select name="paciente_id" class="form-control" required>
          <option value="">Seleccione un Paciente</option>
          {% for paciente in pacientes %}
            <option value="{{ paciente.id }}">{{ paciente.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Fecha</label>
        <input type="date" name="fecha" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Diagnóstico</label>
        <textarea name="diagnostico" class="form-control" rows="2" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Tratamiento</label>
        <textarea name="tratamiento" class="form-control" rows="2" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('consulta.index') }}" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
  </div>
</div>

{% endblock %}
